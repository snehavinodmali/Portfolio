    <!-- Contact -->

    <main>
        <section class="contact-page">
            <h1>Contact Me</h1>
            <form aria-label="Contact form" autocomplete="on">
                <label for="name">Name</label>
                <input id="name" name="name" type="text" placeholder="Enter Name" required>
                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="Enter Email" required>
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Enter Message" required></textarea>
                <button type="submit">Send</button>
            </form>
            <div class="social-links">
                <a href=" https://snehavinodmali.github.io/Portfolio/" target="_blank" aria-label="GitHub"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" alt="GitHub" class="icon-social"> GitHub</a>
                <a href="https://linkedin.com/" target="_blank" aria-label="LinkedIn"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linkedin/linkedin-original.svg" alt="LinkedIn" class="icon-social"> LinkedIn</a>
        </section>
    </main>
